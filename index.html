<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自己紹介 | Hiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#10192B;
    --paper:#F4F2EC;
    --card:#FFFFFF;
    --gold:#B08D3E;
    --slate:#5B6675;
    --line:#DDD8CB;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html{ scroll-behavior:smooth; }

  body{
    background:var(--paper);
    color:var(--navy);
    font-family:'Inter', sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }

  /* Skip link / focus visibility */
  a:focus-visible, button:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:3px;
  }

  .wrap{
    max-width:920px;
    margin:0 auto;
    padding:0 28px;
  }

  /* ---------- HEADER ---------- */
  header{
    padding:64px 0 48px;
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:18px;
  }

  h1{
    font-family:'Source Serif 4', serif;
    font-weight:700;
    font-size:clamp(40px, 7vw, 64px);
    letter-spacing:-0.01em;
    color:var(--navy);
  }

  .role{
    margin-top:14px;
    font-size:17px;
    color:var(--slate);
    font-weight:500;
  }

  .tagline{
    margin-top:28px;
    max-width:56ch;
    font-size:17px;
    color:var(--navy);
    border-left:3px solid var(--gold);
    padding-left:18px;
  }

  /* ---------- MAIN GRID ---------- */
  main{ padding:56px 0 80px; }

  .grid{
    display:grid;
    grid-template-columns:1fr 1.4fr;
    gap:24px;
  }

  @media (max-width:680px){
    .grid{ grid-template-columns:1fr; }
  }

  .card{
    background:var(--card);
    border:1px solid var(--line);
    padding:32px 28px;
  }

  .card h2{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:22px;
  }

  /* Profile card */
  .profile-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:14px 0;
    border-bottom:1px solid var(--line);
  }
  .profile-row:last-child{ border-bottom:none; }

  .profile-label{
    font-size:13px;
    color:var(--slate);
  }

  .profile-value{
    font-family:'Source Serif 4', serif;
    font-size:17px;
    font-weight:600;
    text-align:right;
  }

  /* Interests card */
  .interest-item{
    padding:18px 0;
    border-bottom:1px solid var(--line);
  }
  .interest-item:last-child{ border-bottom:none; }

  .interest-head{
    display:flex;
    align-items:baseline;
    gap:12px;
    margin-bottom:6px;
  }

  .interest-code{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--gold);
    font-weight:700;
    min-width:44px;
  }

  .interest-title{
    font-family:'Source Serif 4', serif;
    font-size:18px;
    font-weight:600;
  }

  .interest-desc{
    font-size:14px;
    color:var(--slate);
    padding-left:56px;
  }

  /* ---------- FOOTER ---------- */
  footer{
    border-top:1px solid var(--line);
    padding:28px 0;
    font-size:13px;
    color:var(--slate);
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
</style>
</head>
<body>

  <div class="wrap">
    <header>
      <div class="eyebrow">Self Introduction</div>
      <h1>Hiromu Hayakawa</h1>
      <p class="role">慶應義塾大学 商学部 1年（日吉キャンパス）</p>
    </header>
  </div>

  <div class="wrap">
    <main>
      <div class="grid">

        <section class="card" aria-label="プロフィール">
          <h2>Profile</h2>
          <div class="profile-row">
            <span class="profile-label">大学</span>
            <span class="profile-value">慶應義塾大学</span>
          </div>
          <div class="profile-row">
            <span class="profile-label">学部</span>
            <span class="profile-value">商学部</span>
          </div>
          <div class="profile-row">
            <span class="profile-label">学年</span>
            <span class="profile-value">1年</span>
          </div>
          <div class="profile-row">
            <span class="profile-label">キャンパス</span>
            <span class="profile-value">日吉</span>
          </div>
        </section>

        <section class="card" aria-label="趣味・興味関心">
          <h2>Interests</h2>

          <div class="interest-item">
            <div class="interest-head">
              <span class="interest-code">01</span>
              <span class="interest-title">ランニング</span>
            </div>
            <p class="interest-desc">週2〜3回、体調と睡眠に合わせて走っています。</p>
          </div>

          <div class="interest-item">
            <div class="interest-head">
              <span class="interest-code">02</span>
              <span class="interest-title">簿記・会計</span>
            </div>
            <p class="interest-desc">日商簿記2級の取得に向けて学習中です。</p>
          </div>

          <div class="interest-item">
            <div class="interest-head">
              <span class="interest-code">03</span>
              <span class="interest-title">音楽</span>
            </div>
            <p class="interest-desc">メロディや構成美を重視した楽曲が好きです。</p>
          </div>

        </section>

      </div>
    </main>

    <footer>
      <span>Self Introduction</span>
      <span>Keio University — Faculty of Commerce</span>
    </footer>
  </div>

</body>
</html>
